# Production environment — Bumbuserbaguna
# Usage:
#   Start : docker compose up -d
#   Stop  : docker compose down
#   Note  : This is a reference config. Adjust for your production needs.

services:
  postgres:
    image: postgres:17-alpine
    container_name: bumbu_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-bumbuserbaguna}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-bumbuserbaguna}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bumbu_network

  redis:
    image: redis:7-alpine
    container_name: bumbu_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bumbu_network

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  bumbu_network:
    driver: bridge
