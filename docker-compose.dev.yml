# Local development environment — Bumbuserbaguna
# Usage:
#   Start : docker compose -f docker-compose.dev.yml up -d
#   Stop  : docker compose -f docker-compose.dev.yml down
#   Reset : docker compose -f docker-compose.dev.yml down -v
#
# Note: This is for LOCAL DEVELOPMENT ONLY
#       - Default credentials: bumbu/localdev
#       - Volumes are mounted for hot-reload support
#       - No authentication required for PostgreSQL/Redis
#       For production, use docker-compose.yml with environment variables

version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: bumbu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bumbuserbaguna
      POSTGRES_USER: bumbu
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bumbu -d bumbuserbaguna"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bumbu_dev_network

  redis:
    image: redis:7-alpine
    container_name: bumbu_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bumbu_dev_network

volumes:
  postgres_data:
  redis_data:

networks:
  bumbu_dev_network:
    driver: bridge
